apiVersion: apps/v1
kind: Deployment
metadata:
  name: msvc-planes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: msvc-planes
  template:
    metadata:
      labels:
        app: msvc-planes
    spec:
      containers:
        - name: planes
          image: alexlocia/planes:latest
          ports:
            - containerPort: 8002
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: msvc-planes
                  key: port
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: msvc-planes
                  key: db_host
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: msvc-planes
                  key: database
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: msvc-planes
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: msvc-planes
                  key: password
            - name: USUARIOS_URL
              valueFrom:
                configMapKeyRef:
                  name: msvc-planes
                  key: usuario_url