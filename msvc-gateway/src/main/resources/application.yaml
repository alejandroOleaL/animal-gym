spring:
  cloud:
    gateway:
      routes:
        - id: msvc-planes
          uri: lb://msvc-planes
          predicates:
            - Path=/api/planes/**
          filters:
            - StripPrefix=2
        - id: msvc-usuarios
          uri: lb://msvc-usuarios
          predicates:
            - Path=/api/usuarios/**
          filters:
            - StripPrefix=2