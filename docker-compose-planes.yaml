version: "3.9"
services:
  postgres14:
    image: postgres:14-alpine
    ports:
      - "5532:5432"
    environment:
      POSTGRES_PASSWORD: sasa
      POSTGRES_DB: msvc_planes
    volumes:
      - data-postgres:/var/lib/postgresql/data
    restart: always
    networks:
      - spring
  msvc-planes:
    container_name: msvc_planes
    image: alexlocia/planes
 #   build:
 #     context: ./
 #     dockerfile: ./msvc-planes/Dockerfile
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      DB_HOST: postgres14:5432
      DB_DATABASE: msvc_planes
      DB_USERNAME: postgres
      DB_PASSWORD: sasa
      USUARIOS_URL: msvc-usuarios:8001
    networks:
      - spring
    depends_on:
      - postgres14
    restart: always
volumes:
  data-postgres:
    name: data-postgres
networks:
  spring:

